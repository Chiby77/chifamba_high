kind = "web"
previewPath = "/"
title = "Chifamba High School"
version = "1.0.0"
id = "artifacts/chifamba-school"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21454

[services.development]
run = "pnpm --filter @workspace/chifamba-school run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chifamba-school", "run", "build" ]
publicDir = "artifacts/chifamba-school/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21454"
BASE_PATH = "/"
